name: GitHub Actions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**.yml'
  pull_request:
    paths:
      - '.github/workflows/**.yml'

permissions:
  contents: read

jobs:
  github-actions:
    name: "GitHub Actions"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@ac593985615ec2ede58e132d2e21d2b1cbd6127c  # v3.3.0

      - name: Ensure SHA pinned actions
        uses: zgosalvez/github-actions-ensure-sha-pinned-actions@21991cec25093947ff3f62e4c223df0260c39944 # v2.1.2
        
      - name: Reviewdog - Actionlint
        uses: reviewdog/action-actionlint@42de1e3a0f52d5f8b8390894de87bc603844e530  # v1.37.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
