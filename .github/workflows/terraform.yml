name: Terraform

concurrency: production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'terraform/**.tf'
  pull_request:
    paths:
      - 'terraform/**.tf'

permissions:
  contents: read

jobs:
  terraform-ci:
    name: "Terraform CI"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      working-directory: ./terraform
    defaults:
      run:
        working-directory: ${{ env.working-directory }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@1f99358870fe1c846a3ccba386cc2b2246836776  # v2.2.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            checkpoint-api.hashicorp.com:443
            github.com:443
            objects.githubusercontent.com:443
            registry.terraform.io:443
            releases.hashicorp.com:443

      - name: Checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9  # v3.5.3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1  # v2.0.3
        with:
          terraform_version: 1.4.0

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Setup tflint
        uses: terraform-linters/setup-tflint@ba6bb2989f94daf58a4cc6eac2c1ca7398a678bf  # v3.0.0
        with:
          tflint_version: v0.45.0

      - name: Terraform tflint init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform tflint
        id: tflint
        run: tflint -f compact

      - name: Terraform tfsec
        id: tfsec
        uses: aquasecurity/tfsec-pr-commenter-action@7a44c5dcde5dfab737363e391800629e27b6376b  # v1.3.1
        with:
          tfsec_version: v1.28.1
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: ''  # https://github.com/aquasecurity/tfsec-pr-commenter-action/issues/90

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
        continue-on-error: true

      - name: Update Pull Request
        uses: actions/github-script@98814c53be79b1d30f795b907e553d8679345975  # v6.4.0
        if: github.event_name == 'pull_request' && success() || failure()
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform tflint 🗺️\`${{ steps.tflint.outcome }}\`
            #### Terraform tfsec 🛡️\`${{ steps.tfsec.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`
            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Validate Status
        if: steps.validate.outcome == 'failure'
        run: exit 1

      - name: Terraform tflint Status
        if: steps.tfsec.outcome == 'failure'
        run: exit 1

      - name: Terraform tfsec Status
        if: steps.tfsec.outcome == 'failure'
        run: exit 1

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload tfplan
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@0b7f8abb1508181956e8e162db84b466c27e18ce  # v3.1.2
        with:
          name: tfplan
          path: ${{ env.working-directory }}/tfplan
          retention-days: 1

  deploy:
    name: "Terraform Deploy"
    environment:
      name: 'production'
      url: 'https://kallelilja.com'
    needs: terraform-ci
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      working-directory: ./terraform
    defaults:
      run:
        working-directory: ${{ env.working-directory }}
    steps:
      - uses: step-security/harden-runner@1f99358870fe1c846a3ccba386cc2b2246836776  # v2.2.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            checkpoint-api.hashicorp.com:443
            github.com:443
            releases.hashicorp.com:443

      - name: Checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9  # v3.5.3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1  # v2.0.3
        with:
          terraform_version: 1.4.0

      - uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a  # v3.0.2
        with:
          name: tfplan
          path: ${{ env.working-directory }}

      - name: terraform --version
        run: terraform --version

      - name: ls
        run: ls
        
      - name: test curl
        run: curl -L http://www.google.com
